name: Weekly Report - 週日週報

on:
  schedule:
    - cron: "0 13 * * 0"   # UTC 13:00 = 台北週日 21:00
  workflow_dispatch:

# 防止 runner 積壓時重複推播週報（cancel:false → 排隊）
concurrency:
  group: training-weekly-report
  cancel-in-progress: false

jobs:
  # secrets 還沒設定（template 本體、剛 fork 還沒照 docs/SETUP.md 設定）→ 綠燈跳過，
  # 不要每週紅燈＋拿空 token 打 LINE API 吃 401
  check-config:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.cfg.outputs.configured }}
    steps:
      - id: cfg
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::尚未設定 LINE secrets，略過週報（照 docs/SETUP.md 設定後自動啟用）"
          fi

  report:
    needs: check-config
    if: needs.check-config.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行週報
        env:
          INTERVALS_API_KEY:           ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID:        ${{ secrets.INTERVALS_ATHLETE_ID }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET:         ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_USER_ID:                ${{ secrets.LINE_USER_ID }}
          FIREBASE_CREDENTIALS_JSON:   ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
        run: python weekly_report.py
