name: Weekly Report - 週日週報

on:
  schedule:
    - cron: "0 13 * * 0"   # UTC 13:00 = 台北週日 21:00
  workflow_dispatch:

# 防止 runner 積壓時重複推播週報（cancel:false → 排隊）
concurrency:
  group: training-weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行週報
        env:
          INTERVALS_API_KEY:           ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID:        ${{ secrets.INTERVALS_ATHLETE_ID }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET:         ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_USER_ID:                ${{ secrets.LINE_USER_ID }}
          FIREBASE_CREDENTIALS_JSON:   ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
        run: python weekly_report.py
