name: Daily Reminder - 每日課表提醒

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = 台北 06:00
  workflow_dispatch:

# 防止 runner 積壓時跨日重複推播（cancel:false → 排隊）
concurrency:
  group: training-daily-reminder
  cancel-in-progress: false

jobs:
  # secrets 還沒設定（template 本體、剛 fork 還沒照 docs/SETUP.md 設定）→ 綠燈跳過，
  # 不要每天紅燈＋拿空 token 打 LINE API 吃 401
  check-config:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.cfg.outputs.configured }}
    steps:
      - id: cfg
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::尚未設定 LINE secrets，略過每日提醒（照 docs/SETUP.md 設定後自動啟用）"
          fi

  remind:
    needs: check-config
    if: needs.check-config.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行每日教練卡
        env:
          TZ: Asia/Taipei
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET:         ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_USER_ID:                ${{ secrets.LINE_USER_ID }}
          FIREBASE_CREDENTIALS_JSON:   ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          WELLNESS_COACH_API:          ${{ secrets.WELLNESS_COACH_API }}
          WELLNESS_COACH_TOKEN:        ${{ secrets.WELLNESS_COACH_TOKEN }}
        run: python daily_reminder.py
